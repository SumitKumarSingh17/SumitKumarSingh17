name: Generate GitHub Trophies

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

jobs:
  update-trophies:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Generate trophy image
        uses: Erik-Donath/github-profile-trophy@feature/generate-svg
        with:
          username: SumitKumarSingh17
          output_path: trophy.svg
          theme: tokyonight
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add trophy.svg
          git diff --quiet && git diff --staged --quiet || (git commit -m "Update trophy image" && git push)
